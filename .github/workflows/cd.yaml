name: Continous Delivery Workflow

on:
  # Run only after the CI workflow completes on main (chained via workflow_run).
  workflow_run:
    workflows: ["Continuous Integration Workflow"]
    types:
      - completed
    branches:
      - main
  workflow_dispatch:        # allow manual runs from the Actions tab

env:
  AWS_REGION: eu-west-2

# Required for OIDC auth to AWS (no long-lived keys)
permissions:
  id-token: write
  contents: read

jobs:
  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    environment: staging
    # workflow_run fires on completion regardless of result — only deploy when
    # CI actually passed (or when triggered manually).
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.workflow_run.conclusion == 'success'

    steps:

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Resolve latest image from ECR
        id: fetch-image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
        run: |
          DIGEST=$(aws ecr describe-images \
            --repository-name "${{ vars.ECR_REPOSITORY }}" \
            --image-ids imageTag=latest \
            --query 'imageDetails[0].imageDigest' \
            --output text)
          echo "image=$ECR_REGISTRY/${{ vars.ECR_REPOSITORY }}@$DIGEST" >> "$GITHUB_OUTPUT"

      # Pull the CURRENT task definition live from ECS so you don't have to
      # commit a task-definition.json to the repo.
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition "${{ vars.TASK_DEFINITION_FAMILY }}" \
            --query 'taskDefinition' \
            --output json > task-definition.json

      - name: Render new task definition with the new image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition: task-definition.json
          container-name: ${{ vars.CONTAINER_NAME }}
          image: ${{ steps.fetch-image.outputs.image }}

      - name: Deploy to Amazon ECS
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition: ${{ steps.task-def.outputs.task-definition }}
          service: ${{ vars.ECS_SERVICE }}
          cluster: ${{ vars.ECS_CLUSTER }}
          wait-for-service-stability: true    # waits until the new tasks are healthy

  smoke-test:
    name: Smoke Test (staging)
    runs-on: ubuntu-latest
    needs: deploy-staging
    environment: staging

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Resolve staging URL
        id: url
        run: |
          DNS=$(aws elbv2 describe-load-balancers \
            --names "${{ vars.ECS_CLUSTER }}-alb" \
            --query 'LoadBalancers[0].DNSName' \
            --output text)
          echo "base=http://$DNS" >> "$GITHUB_OUTPUT"

      - name: Smoke test health endpoint
        run: |
          BASE="${{ steps.url.outputs.base }}"
          echo "Smoke testing $BASE/health"
          for i in $(seq 1 10); do
            code=$(curl -s -o /dev/null -w '%{http_code}' "$BASE/health" || echo 000)
            echo "Attempt $i: HTTP $code"
            if [ "$code" = "200" ]; then
              echo "Smoke test passed ✅"
              exit 0
            fi
            sleep 15
          done
          echo "Smoke test failed ❌: $BASE/health did not return 200"
          exit 1


