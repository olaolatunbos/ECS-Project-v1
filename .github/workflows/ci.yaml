name: Continuous Integration Workflow

on:
  workflow_dispatch:
  pull_request:
    branches:
      - main
    paths:
      - 'app/**'
  push:
    branches: [main]
    paths:
      - 'app/**'


permissions:
  contents: read
  pull-requests: read
  id-token: write  

jobs:
  static-analysis:
    name: Static Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Formating
        run: ruff format --check .

      - name: Linting
        run: ruff check .

  test:
    name: Test and Coverage
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.11

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Run tests with coverage
        run: pytest --cov=app --cov-report=xml --cov-report=html --cov-report=term

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: |
            app/coverage.xml
            app/htmlcov/

  security:
    name: Security Analysis
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        with:
          # Full history so gitleaks can scan all commits, not just HEAD.
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: 3.12

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt

      - name: Dependency audit (pip-audit)
        # Pipe both streams to the file so the report artifact always exists:
        # pip-audit does NOT write --output when it finds zero vulnerabilities.
        run: pip-audit -r requirements.txt --format markdown 2>&1 | tee pip-audit-report.md

      - name: Upload dependency audit report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: dependency-audit-report
          path: app/pip-audit-report.md

      - name: Secret scanning (gitleaks)
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docker-build:
    name: Docker Build and Scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Build image
        run: docker build -t task-management:${{ github.sha }} ./app

      - name: Scan image with Trivy
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: task-management:${{ github.sha }}
          format: table
          output: trivy-results.txt
          severity: CRITICAL
          ignore-unfixed: true
          exit-code: 1

      - name: Upload Trivy scan report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: trivy-image-scan
          path: trivy-results.txt

  docker-push:
    name: Push to ECR
    runs-on: ubuntu-latest
    needs: [static-analysis, test, security, docker-build]
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'  
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions
          aws-region: eu-west-2    

      - name: Log in to Amazon ECR
        id: ecr-login
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push
        env:
          REGISTRY: ${{ steps.ecr-login.outputs.registry }}
          STAGING_REPOSITORY: staging/task-management
          PRODUCTION_REPOSITORY: production/task-management
          IMAGE_TAG: ${{ github.sha }}
        run: |
          # Build once, tag for both the staging and production ECR repos
          # (same registry/account), then push all tags.
          docker build \
            -t $REGISTRY/$STAGING_REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$STAGING_REPOSITORY:latest \
            -t $REGISTRY/$PRODUCTION_REPOSITORY:$IMAGE_TAG \
            -t $REGISTRY/$PRODUCTION_REPOSITORY:latest \
            ./app

          docker push $REGISTRY/$STAGING_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$STAGING_REPOSITORY:latest
          docker push $REGISTRY/$PRODUCTION_REPOSITORY:$IMAGE_TAG
          docker push $REGISTRY/$PRODUCTION_REPOSITORY:latest

      





