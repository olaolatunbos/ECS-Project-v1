name: Terraform Apply

# Applies on merge to main. Staging applies automatically; production is gated
# by the `production` GitHub Environment (add required reviewers = approval).
on:
  push:
    branches:
      - main
    paths:
      - "terraform/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # OIDC auth to AWS

env:
  AWS_REGION: eu-west-2

jobs:
  apply-staging:
    name: Apply (staging)
    runs-on: ubuntu-latest
    environment: staging
    concurrency:
      group: tf-apply-staging
      cancel-in-progress: false # never cancel a running apply
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Select Workspace
        run: terraform workspace select staging

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color

  apply-production:
    name: Apply (production)
    runs-on: ubuntu-latest
    needs: apply-staging # promote only after staging succeeds
    environment: production # add required reviewers here for a manual approval gate
    concurrency:
      group: tf-apply-production
      cancel-in-progress: false
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init

      - name: Select Workspace
        run: terraform workspace select production

      - name: Terraform Apply
        run: terraform apply -auto-approve -no-color
