name: Terraform Plan
on:
  pull_request:
    branches:
      - main
    paths:
      - "terraform/**"
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  pull-requests: write

jobs:
  terraform-plan:
    name: Terraform Plan (${{ matrix.environment }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        environment: [staging, production]
    defaults:
      run:
        working-directory: ./terraform
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: arn:aws:iam::${{ secrets.AWS_ACCOUNT_ID }}:role/github-actions
          aws-region: eu-west-2

      - name: Terraform Init
        id: init
        run: terraform init

      - name: Select Workspace
        id: workspace
        run: terraform workspace select -or-create ${{ matrix.environment }}

      - name: Terraform Fmt
        id: fmt
        run: terraform fmt -check

      - name: Terraform Validate
        id: validate
        run: terraform validate -no-color

      - name: Run Checkov Scan
        uses: bridgecrewio/checkov-action@v12
        with:
          soft_fail: true
        env:
          CHECKOV_SKIP_UPDATE: true

      - name: Terraform Plan
        id: plan
        run: |
          terraform plan -no-color -out ${{ matrix.environment }}.tfplan
          terraform show -no-color ${{ matrix.environment }}.tfplan > plan.txt

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ matrix.environment }}
          path: ./terraform/${{ matrix.environment }}.tfplan
          retention-days: 5

      - name: Set Plan Output
        run: |
          echo "PLAN_OUTPUT<<EOF" >> $GITHUB_ENV
          cat plan.txt >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV

      - name: Add Plan To Pull Request
        if: github.event_name == 'pull_request'
        uses: thollander/actions-comment-pull-request@v3
        with:
          comment-tag: plan-${{ matrix.environment }}
          message: |
            ### Terraform Plan — `${{ matrix.environment }}`
            ```
            ${{ env.PLAN_OUTPUT }}
            ```
